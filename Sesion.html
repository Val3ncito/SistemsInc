}

    height:calc(100vh - 80px);
    display:flex;
    align-items:center;

}

.login-box{
    background:#2c2c2c;
    padding:40px;
    border-radius:10px;
    width:320px;
    text-align:center;
}

.login-box input,
.login-box button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    box-sizing:border-box;
}

.login-box button{
    background:#00bcd4;
    color:white;
    cursor:pointer;
}

    background:#0097a7;
