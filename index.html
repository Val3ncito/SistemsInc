.hero{

    overflow:hidden;
}

.hero video{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;

    z-index:-2;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

.hero-content{
    max-width:700px;
    padding:20px;
    margin-top:60px;
}

.hero-content h1{
    font-size:42px;
    margin-bottom:20px;
}

.hero-content p{
    font-size:18px;
}

body.index header{
    background:transparent;
    position:absolute;
    width:100%;
    top:0;
    left:0;
    z-index:1000;
}

@media(max-width:768px){
    .hero-content h1{ font-size:28px; }
}
</style>
</head>
