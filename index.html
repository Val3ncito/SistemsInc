<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inicio - Sistems Inc</title>
<link rel="icon" href="Documentos/Varios/Logo.png" type="image/png">
<link rel="stylesheet" href="styles.css">

<style>



/* ESPACIO PARA EL VIDEO */
.hero{
    position:relative;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    overflow:hidden;
}

/* VIDEO DE FONDO */
.hero video{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* OSCURO*/
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

/* TEXTO */
.hero-content{
    max-width:700px;
    padding:20px;
    margin-top:60px; 
}

.hero-content h1{
    font-size:42px;
    margin-bottom:20px;
}

.hero-content p{
    font-size:18px;
    line-height:1.6;
}


body.index header{
    background:transparent !important;
    position:absolute;
    width:100%;
    top:0;
    left:0;
    z-index:1000;
}

/* RESPONSIVE */
@media(max-width:768px){

    .hero-content h1{
        font-size:28px;
    }

}

</style>
</head>

<body class="index">

<!-- HEADER -->
<header>

    <div class="logo">
        <a href="index.html">
            <img src="Documentos/Varios/Logo.png" alt="Logo Sistems Inc">
        </a>
    </div>

    <nav>
        <a href="index.html" style="pointer-events:none;">Inicio</a>
        <a href="Nuestros_Proyectos.html">Nuestros Proyectos</a>
        <a href="Sobre_Nosotros.html">Sobre Nosotros</a>
        <a href="Contacto.html">Contacto</a>
    </nav>

</header>

<!-- MAIN -->
<main>

    <section class="hero">

        <!-- VIDEO -->
        <video autoplay muted loop>
            <source src="Documentos/Varios/VideoPresentación.mp4" type="video/mp4">
        </video>

        <div class="overlay"></div>

        <div class="hero-content">
            <h1>Sistems Inc</h1>
            <p>
                Innovación en proyectos de construcción moderna
            </p>
            
            <p>
                lo que soñas lo convertimos en realidad.
            </p>
        </div>

    </section>

</main>

</body>
</html>
